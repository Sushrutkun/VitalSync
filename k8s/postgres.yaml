apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: vitalsync
type: Opaque
stringData:
  POSTGRES_USER: vitalsync
  POSTGRES_PASSWORD: change-me-in-prod
  POSTGRES_DB: vitalsync
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: vitalsync
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          # Demo-grade: emptyDir wipes on pod restart. Replace with PVC for prod.
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "vitalsync", "-d", "vitalsync"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "vitalsync", "-d", "vitalsync"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vitalsync
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
